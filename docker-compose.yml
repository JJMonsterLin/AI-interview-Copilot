services:
  ollama:
    image: dustynv/ollama:r36.4.0-cu128-24.04
    network_mode: host
    runtime: nvidia
    volumes:
      - ollama-models:/root/.ollama
    # Pull both models on startup, then serve
    entrypoint: >
      sh -c "ollama serve &
             sleep 10 &&
             ollama pull qwen2.5:3b &&
             ollama pull gemma2:2b &&
             wait"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 300s

  asr:
    image: faster-whisper:fastapi
    network_mode: host
    runtime: nvidia
    depends_on:
      ollama:
        condition: service_healthy

  tts:
    image: dustynv/kokoro-tts:fastapi-r36.4.0-cu128-24.04
    network_mode: host
    runtime: nvidia
    depends_on:
      ollama:
        condition: service_healthy

  app:
    build: .
    network_mode: host
    volumes:
      - app-data:/data
    environment:
      - ASR_URL=http://localhost:5092
      - LLM_URL=http://localhost:11434
      - TTS_URL=http://localhost:8880
      - DB_PATH=/data/interview.db
      - MAX_TURNS=6
      - APP_PORT=3000
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  app-data:
  ollama-models:
